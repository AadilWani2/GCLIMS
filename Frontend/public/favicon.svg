<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients matching the clinical branding -->
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0fa392" />
      <stop offset="100%" stop-color="#028090" />
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f3560" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="fluidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0fa392" />
      <stop offset="50%" stop-color="#0a5071" />
      <stop offset="100%" stop-color="#0f3560" />
    </linearGradient>
  </defs>

  <!-- ── EMBLEM SECTION ────────────────────────────────────── -->
  <g transform="translate(0, -10)">
    <!-- Ring / Circle frame -->
    <!-- Left Side: Teal-leaning segment -->
    <path d="M 170 345 C 75 305 50 160 135 70 C 180 30 240 15 300 30" fill="none" stroke="url(#ringGrad)" stroke-width="22" stroke-linecap="round" />
    <!-- Right Side: Widescreen navy-leaning segment -->
    <path d="M 320 33 C 390 48 435 115 440 190 C 445 260 395 340 300 365" fill="none" stroke="url(#ringGrad)" stroke-width="22" stroke-linecap="round" />

    <!-- Supporting Hand at the bottom -->
    <path d="M 130 315 C 180 395 330 400 390 315 C 330 365 240 365 170 330 C 150 320 140 312 130 315 Z" fill="url(#tealGrad)" />
    <path d="M 170 330 C 230 360 310 355 365 320 C 310 332 240 325 195 305 C 180 297 170 297 160 305" fill="url(#tealGrad)" opacity="0.6" />

    <!-- Test Tube (Left) -->
    <g transform="translate(165, 80)">
      <rect x="15" y="10" width="30" height="95" rx="15" fill="none" stroke="#0f3560" stroke-width="10" stroke-linejoin="round" />
      <rect x="9" y="3" width="42" height="8" rx="2" fill="#0f3560" />
      <rect x="21" y="40" width="18" height="55" rx="9" fill="url(#fluidGrad)" />
      <circle cx="26" cy="53" r="2.5" fill="#ffffff" opacity="0.8" />
      <circle cx="34" cy="62" r="2" fill="#ffffff" opacity="0.8" />
      <circle cx="29" cy="75" r="3" fill="#ffffff" opacity="0.8" />
    </g>

    <!-- Microscope (Right) -->
    <g transform="translate(225, 60)" fill="#0f3560">
      <path d="M 25 155 L 125 155 C 125 147 117 135 100 135 L 50 135 C 33 135 25 147 25 155 Z" />
      <rect x="38" y="122" width="76" height="12" rx="3" />
      <rect x="25" y="97" width="80" height="8" rx="2" />
      <path d="M 92 135 C 117 135 130 100 120 72 C 112 47 90 42 78 55 L 90 72 C 98 63 106 68 109 80 C 111 93 103 110 90 114" fill="none" stroke="#0f3560" stroke-width="13" stroke-linecap="round" />
      <rect x="58" y="20" width="13" height="42" transform="rotate(-30 58 20)" rx="3" />
      <rect x="54" y="9" width="22" height="12" transform="rotate(-30 54 9)" rx="2" />
      <rect x="63" y="58" width="18" height="30" transform="rotate(-30 63 58)" rx="3" />
      <circle cx="100" cy="98" r="9" />
      <circle cx="100" cy="98" r="6" fill="#ffffff" />
      <circle cx="100" cy="98" r="2.5" />
      <g transform="translate(52, 82) rotate(20)">
        <rect x="0" y="0" width="10" height="17" rx="2" />
        <rect x="13" y="-3" width="8" height="13" rx="2" opacity="0.8" />
      </g>
    </g>
  </g>

  <!-- ── TYPOGRAPHY SECTION ────────────────────────────────── -->
  <!-- GOUSIA -->
  <text x="256" y="380" font-family="'Times New Roman', 'Playfair Display', 'Georgia', serif" font-weight="900" font-size="64" fill="#0f3560" text-anchor="middle" letter-spacing="4">GOUSIA</text>

  <!-- CLINICAL LABORATORY -->
  <text x="256" y="420" font-family="'Inter', 'Outfit', 'Segoe UI', sans-serif" font-weight="800" font-size="28" fill="#0fa392" text-anchor="middle" letter-spacing="3.5">CLINICAL LABORATORY</text>

  <!-- Heartbeat pulse & divider line -->
  <g transform="translate(0, 5)">
    <!-- Left horizontal line -->
    <line x1="60" y1="440" x2="220" y2="440" stroke="#0f3560" stroke-width="2.5" />
    
    <!-- Heartbeat signal line -->
    <path d="M 220 440 L 232 440 L 238 430 L 244 455 L 252 422 L 258 447 L 264 436 L 270 440 L 278 440 L 292 440" fill="none" stroke="#0fa392" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Right horizontal line -->
    <line x1="292" y1="440" x2="452" y2="440" stroke="#0f3560" stroke-width="2.5" />
  </g>

  <!-- Tagline: ACCURATE RESULTS, BETTER HEALTH -->
  <text x="256" y="475" font-family="'Inter', 'Outfit', 'Segoe UI', sans-serif" font-weight="700" font-size="14.5" fill="#0f3560" text-anchor="middle" letter-spacing="2.5">ACCURATE RESULTS, BETTER HEALTH</text>
</svg>