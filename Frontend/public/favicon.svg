<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients matching the clinical branding -->
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0fa392" />
      <stop offset="100%" stop-color="#028090" />
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f3560" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="fluidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0fa392" />
      <stop offset="50%" stop-color="#0a5071" />
      <stop offset="100%" stop-color="#0f3560" />
    </linearGradient>
  </defs>

  <!-- ── Ring / Circle frame ────────────────────────────────── -->
  <!-- Left Side: Teal-leaning segment -->
  <path d="M 170 415 C 65 370 40 210 135 110 C 180 65 240 50 300 65" fill="none" stroke="url(#ringGrad)" stroke-width="26" stroke-linecap="round" />
  <!-- Right Side: Widescreen navy-leaning segment -->
  <path d="M 320 68 C 400 85 450 160 455 240 C 460 320 400 410 300 440" fill="none" stroke="url(#ringGrad)" stroke-width="26" stroke-linecap="round" />

  <!-- ── Supporting Hand at the bottom ──────────────────────── -->
  <path d="M 130 380 C 180 470 330 475 390 380 C 330 435 240 435 170 395 C 150 385 140 375 130 380 Z" fill="url(#tealGrad)" />
  <path d="M 170 395 C 230 430 310 425 365 385 C 310 400 240 390 195 365 C 180 355 170 355 160 365" fill="url(#tealGrad)" opacity="0.6" />

  <!-- ── Test Tube (Left) ───────────────────────────────────── -->
  <g transform="translate(160, 115)">
    <!-- Glass body border -->
    <rect x="15" y="10" width="36" height="110" rx="18" fill="none" stroke="#0f3560" stroke-width="12" stroke-linejoin="round" />
    <!-- Lip at the top -->
    <rect x="9" y="3" width="48" height="10" rx="3" fill="#0f3560" />
    <!-- Red Liquid Inside -->
    <rect x="23" y="45" width="20" height="63" rx="10" fill="url(#fluidGrad)" />
    
    <!-- Floating bubbles inside -->
    <circle cx="28" cy="60" r="3" fill="#ffffff" opacity="0.8" />
    <circle cx="37" cy="70" r="2.5" fill="#ffffff" opacity="0.8" />
    <circle cx="31" cy="85" r="3.5" fill="#ffffff" opacity="0.8" />
  </g>

  <!-- ── Microscope (Right) ─────────────────────────────────── -->
  <g transform="translate(225, 90)" fill="#0f3560">
    <!-- Base -->
    <path d="M 25 185 L 145 185 C 145 175 135 160 115 160 L 55 160 C 35 160 25 175 25 185 Z" />
    <rect x="40" y="145" width="90" height="15" rx="4" />
    
    <!-- Stage -->
    <rect x="25" y="115" width="95" height="10" rx="3" />
    
    <!-- Main Arm/Curve -->
    <path d="M 105 160 C 135 160 150 120 140 85 C 130 55 105 50 90 65 L 105 85 C 115 75 125 80 128 95 C 130 110 120 130 105 135" fill="none" stroke="#0f3560" stroke-width="16" stroke-linecap="round" />

    <!-- Eyepiece & Tube -->
    <rect x="68" y="25" width="16" height="50" transform="rotate(-30 68 25)" rx="4" />
    <rect x="63" y="12" width="26" height="15" transform="rotate(-30 63 12)" rx="2" />
    <rect x="74" y="70" width="22" height="35" transform="rotate(-30 74 70)" rx="4" />
    
    <!-- Focus knob -->
    <circle cx="115" cy="115" r="11" />
    <circle cx="115" cy="115" r="7" fill="#ffffff" />
    <circle cx="115" cy="115" r="3" />

    <!-- Objective Lenses -->
    <g transform="translate(58, 98) rotate(20)">
      <rect x="0" y="0" width="12" height="20" rx="2" />
      <rect x="16" y="-3" width="10" height="16" rx="2" opacity="0.8" />
    </g>
  </g>
</svg>